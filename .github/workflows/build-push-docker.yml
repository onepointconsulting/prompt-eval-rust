name: Build and push Docker images for Prompt Eval

on:
  push:
    branches:
      - deployment

env:
  IMAGE_NAME_BACKEND: prompt-eval/prompt-eval-rust
  IMAGE_NAME_FRONTEND: prompt-eval/prompt-eval-ui
  AWS_REGION: eu-west-2
  ECR_REGISTRY: 303872128380.dkr.ecr.eu-west-2.amazonaws.com
  NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api

jobs:
  build-and-push-prompt-eval-rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Update git submodules
        run: |
          git submodule update --init --recursive

      - name: Build Docker image
        run: |
          docker build -f Dockerfile -t ${{ env.IMAGE_NAME_BACKEND }}:deploy-${{ github.run_number }} .

      - name: Tag image for ECR
        run: |
          docker tag ${{ env.IMAGE_NAME_BACKEND }}:deploy-${{ github.run_number }} ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:deploy-${{ github.run_number }}
          docker tag ${{ env.IMAGE_NAME_BACKEND }}:deploy-${{ github.run_number }} ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest

      - name: Push image to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:deploy-${{ github.run_number }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest

  build-and-push-prompt-eval-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build Docker image
        run: |
          docker build \
            -f prompt-eval-ui/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }} \
            -t ${{ env.IMAGE_NAME_FRONTEND }}:deploy-${{ github.run_number }} \
            prompt-eval-ui

      - name: Tag image for ECR
        run: |
          docker tag ${{ env.IMAGE_NAME_FRONTEND }}:deploy-${{ github.run_number }} ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:deploy-${{ github.run_number }}
          docker tag ${{ env.IMAGE_NAME_FRONTEND }}:deploy-${{ github.run_number }} ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest

      - name: Push image to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:deploy-${{ github.run_number }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
