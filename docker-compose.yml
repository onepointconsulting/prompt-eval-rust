services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: prompt_eval
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prompt_eval"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://postgres:password@postgres:5432/prompt_eval
      BOOTSTRAP_SCRIPT: /var/sql/db-queries.sql
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL_HAIKU: ${ANTHROPIC_MODEL_HAIKU}
      ANTHROPIC_MODEL_SONNET: ${ANTHROPIC_MODEL_SONNET}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: prompt-eval-ui/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: C:/var/docker/prompt_eval/postgres-data
