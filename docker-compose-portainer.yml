name: prompt_eval

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: prompt_eval
    volumes:
      - prompt_eval_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prompt_eval"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prompt_eval_network

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/prompt_eval
      BOOTSTRAP_SCRIPT: /var/sql/db-queries.sql
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL_HAIKU: ${ANTHROPIC_MODEL_HAIKU}
      ANTHROPIC_MODEL_SONNET: ${ANTHROPIC_MODEL_SONNET}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      prompt_eval_network:
      macvlan_network:
        ipv4_address: 192.168.108.220

  ui:
    restart: unless-stopped
    build:
      context: .
      dockerfile: prompt-eval-ui/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  prompt_eval_postgres_data:

networks:
  prompt_eval_network:
    driver: bridge
  macvlan_network:
    external: true
    name: "MacVlan Server 192.168.108.0/22"