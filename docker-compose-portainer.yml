name: prompt_eval

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: prompt_eval
    volumes:
      - prompt_eval_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prompt_eval"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prompt_eval_network

  api:
    restart: unless-stopped
    image: 303872128380.dkr.ecr.eu-west-2.amazonaws.com/prompt-eval/prompt-eval-rust
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/prompt_eval
      BOOTSTRAP_SCRIPT: /var/sql/db-queries.sql
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL_HAIKU: ${ANTHROPIC_MODEL_HAIKU}
      ANTHROPIC_MODEL_SONNET: ${ANTHROPIC_MODEL_SONNET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      prompt_eval_network:

  ui:
    restart: unless-stopped
    image: 303872128380.dkr.ecr.eu-west-2.amazonaws.com/prompt-eval/prompt-eval-ui
    depends_on:
      - api
    networks:
      prompt_eval_network:
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_DEV_EMAIL: ${AUTH_DEV_EMAIL}
      AUTH_DEV_PASSWORD: ${AUTH_DEV_PASSWORD}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      INTERNAL_API_BASE_URL: https://prompt-eval.dev.onepointltd.ai/api

  nginx:
    restart: unless-stopped
    image: 303872128380.dkr.ecr.eu-west-2.amazonaws.com/prompt-eval/prompt-eval-nginx
    ports:
      - "80:80"
    depends_on:
      - api
      - ui
    environment:
      FRPC_LOCAL_PORT: 80
      FRPC_PROXY_NAME: prompt-eval
      FRPC_REMOTE_PORT: ${FRPC_REMOTE_PORT}
      FRPC_SERVER_ADDR: ${FRPC_SERVER_ADDR}
      FRPC_SERVER_PORT: ${FRPC_SERVER_PORT}
      FRPC_TOKEN: ${FRPC_TOKEN}
    networks:
      prompt_eval_network:

volumes:
  prompt_eval_postgres_data:

networks:
  prompt_eval_network:
    driver: bridge